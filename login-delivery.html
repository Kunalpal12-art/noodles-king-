<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delivery Person Login - Noodles King</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>
<body class="login-body theme-delivery">

    <div class="login-card">
        <div class="login-header">
            <h1>Noodles<span>King</span></h1>
            <h2>Delivery <span>Portal</span></h2>
            <p>Access your routes and orders efficiently.</p>
        </div>

        <form class="login-form">
            <div class="input-group">
                <label for="delivery-id">Delivery ID</label>
                <input type="text" id="delivery-id" placeholder="DK-2026-X" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn primary-btn full-width">Start Working</button>
        </form>

        <a href="/" class="back-home"><ion-icon name="arrow-back-outline"></ion-icon> Back to Main</a>
    </div>

</body>
</html>
